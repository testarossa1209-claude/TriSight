<!DOCTYPE html>
<html lang="ja">
<head>
 <link rel="apple-touch-icon" href="TriSight_logo_registered最新商標.jpg"> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TriSight™ Launcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --navy: #0d1b2a;
    --navy2: #1a2e45;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --cream: #f5f0e8;
    --text: #e8e0d0;
    --dim: #8a9bb0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(26,46,69,0.8) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ロゴエリア */
  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
  }

  .logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    margin-top: 4px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px 0;
  }

  /* メンバーカード */
  .members {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .card {
    background: linear-gradient(145deg, var(--navy2), #0f2035);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 28px 20px 22px;
    width: 200px;
    text-align: center;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(201,168,76,0.15);
  }

  .card-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top;
    border: 2px solid var(--gold);
    margin: 0 auto 14px;
    display: block;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--gold2);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .card-role {
    font-size: 0.62rem;
    color: var(--dim);
    letter-spacing: 0.2em;
  }

  .card-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dim);
  }

  /* 起動ボタン */
  .launch-btn {
    background: linear-gradient(135deg, var(--gold), #a8782e);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 14px 48px;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    margin-bottom: 32px;
  }

  .launch-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.5);
  }

  .launch-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* 出席確認エリア */
  #attendance-area {
    display: none;
    width: 100%;
    max-width: 560px;
    background: linear-gradient(145deg, var(--navy2), #0f2035);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 28px;
  }

  .att-title {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    margin-bottom: 20px;
    text-align: center;
  }

  .att-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }

  .att-row:last-child { border-bottom: none; }

  .att-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top;
    border: 1.5px solid rgba(201,168,76,0.4);
    flex-shrink: 0;
  }

  .att-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--gold2);
    letter-spacing: 0.1em;
    width: 80px;
    flex-shrink: 0;
  }

  .att-status {
    font-size: 0.75rem;
    color: var(--dim);
    flex: 1;
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }

  .att-status.ok { color: #6fc98a; }
  .att-status.connecting { color: var(--gold); }

  /* 今日の問い */
  #question-area {
    display: none;
    width: 100%;
    max-width: 560px;
    background: linear-gradient(145deg, rgba(201,168,76,0.08), rgba(13,27,42,0.6));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 12px;
    padding: 24px 28px;
    text-align: center;
    margin-bottom: 28px;
  }

  .q-label {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--text);
    font-style: italic;
  }

  /* システムテキスト */
  #sys-text {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    margin-top: 8px;
    min-height: 1.2em;
    text-align: center;
  }

  /* ルーティングエリア */
  #routing-area {
    display: none;
    width: 100%;
    max-width: 560px;
    margin-bottom: 20px;
  }

  .route-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-align: center;
    margin-bottom: 12px;
  }

  .chips {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .chip {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: var(--dim);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chip-avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top;
  }

  .chip.selected {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold2);
  }

  /* 入力エリア */
  #input-area {
    display: none;
    width: 100%;
    max-width: 560px;
    margin-bottom: 16px;
  }

  .transcript-box {
    width: 100%;
    min-height: 80px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.9rem;
    outline: none;
    resize: vertical;
    margin-bottom: 10px;
    line-height: 1.7;
  }

  .transcript-box:focus {
    border-color: rgba(201,168,76,0.5);
  }

  .input-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-send {
    background: linear-gradient(135deg, var(--gold), #a8782e);
    color: var(--navy);
    border: none;
    border-radius: 6px;
    padding: 9px 28px;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-clear {
    background: transparent;
    color: var(--dim);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 9px 18px;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s;
  }

  /* ログ */
  #log-area {
    display: none;
    width: 100%;
    max-width: 560px;
  }

  .log-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--dim);
    margin-bottom: 10px;
    text-align: center;
  }

  #log-items {
    max-height: 200px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-item {
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.82rem;
    line-height: 1.6;
    border-left: 3px solid var(--gold);
  }

  .log-item.azusa { border-color: #7ec8c8; background: rgba(126,200,200,0.07); }
  .log-item.nagisa { border-color: #c87eb4; background: rgba(200,126,180,0.07); }
  .log-item.tsukasa { border-color: #7e9cc8; background: rgba(126,156,200,0.07); }

  .log-time { font-size: 0.68rem; color: var(--dim); margin-bottom: 4px; }

  /* フッター */
  .footer {
    margin-top: auto;
    padding-top: 40px;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: rgba(138,155,176,0.4);
  }
</style>
</head>
<body>

<div class="logo-area">
  <div class="logo-title">TriSight™</div>
  <div class="logo-sub">三位一体型知的統合支援システム</div>
  <div class="divider"></div>
</div>

<div class="members">
  <div class="card">
    <div class="card-badge" id="badge-azusa"></div>
    <img class="card-avatar" id="avatar-azusa-card" src="" alt="あずさ">
    <div class="card-name">あずさ</div>
    <div class="card-role">CONCEPT AI</div>
  </div>
  <div class="card">
    <div class="card-badge" id="badge-nagisa"></div>
    <img class="card-avatar" id="avatar-nagisa-card" src="" alt="なぎさ">
    <div class="card-name">なぎさ</div>
    <div class="card-role">VERIFY AI</div>
  </div>
  <div class="card">
    <div class="card-badge" id="badge-tsukasa"></div>
    <img class="card-avatar" id="avatar-tsukasa-card" src="" alt="つかさ">
    <div class="card-name">つかさ</div>
    <div class="card-role">EVALUATE AI</div>
  </div>
</div>

<button class="launch-btn" id="launch-btn" onclick="launch()">TriSight 起動</button>

<div id="attendance-area">
  <div class="att-title">— ATTENDANCE CHECK —</div>
  <div class="att-row">
    <img class="att-avatar" id="att-avatar-azusa" src="" alt="あずさ">
    <div class="att-name">あずさ</div>
    <div class="att-status" id="stat-azusa">待機中…</div>
  </div>
  <div class="att-row">
    <img class="att-avatar" id="att-avatar-nagisa" src="" alt="なぎさ">
    <div class="att-name">なぎさ</div>
    <div class="att-status" id="stat-nagisa">待機中…</div>
  </div>
  <div class="att-row">
    <img class="att-avatar" id="att-avatar-tsukasa" src="" alt="つかさ">
    <div class="att-name">つかさ</div>
    <div class="att-status" id="stat-tsukasa">待機中…</div>
  </div>
</div>

<div id="question-area">
  <div class="q-label">— TODAY'S QUESTION —</div>
  <div class="q-text" id="q-text"></div>
</div>

<div id="routing-area">
  <div class="route-label">— 送信先を選択 —</div>
  <div class="chips">
    <button class="chip selected" id="chip-azusa" onclick="selectRoute('azusa')">
      <img class="chip-avatar" id="chip-img-azusa" src="" alt="">あずさ
    </button>
    <button class="chip" id="chip-nagisa" onclick="selectRoute('nagisa')">
      <img class="chip-avatar" id="chip-img-nagisa" src="" alt="">なぎさ
    </button>
    <button class="chip" id="chip-tsukasa" onclick="selectRoute('tsukasa')">
      <img class="chip-avatar" id="chip-img-tsukasa" src="" alt="">つかさ
    </button>
  </div>
</div>

<div id="input-area">
  <div class="transcript-box" id="transcript" contenteditable="true"
    placeholder="起案内容を入力…"
    oninput="checkSendable()"></div>
  <div class="input-btns">
    <button class="btn-clear" onclick="clearInput()">クリア</button>
    <button class="btn-send" id="send-btn" disabled onclick="sendInput()">送信</button>
  </div>
</div>

<div id="log-area">
  <div class="log-label">— SEND LOG —</div>
  <div id="log-items"></div>
</div>

<div id="sys-text"></div>

<div class="footer">TriSight™ &nbsp;©&nbsp; 合同会社トライサイト &nbsp;|&nbsp; 登録商標</div>

const QUESTIONS = [
  "今日のTriSightに、昨日より深い問いを持ち込めているか。",
  "構想の中に、まだ言語化されていない核心はないか。",
  "三者の対話を経ることで、何が変化したか。",
  "今日の起案は、誰のためのものか。",
  "評価とは批判ではなく、可能性の測定である。",
  "あなたが避けている問いこそ、最も重要な問いかもしれない。",
  "TriSightは道具ではなく、思考の鏡である。"
];

const routes = {
  azusa:  { name: 'あずさ', cls: 'azusa' },
  nagisa: { name: 'なぎさ', cls: 'nagisa' },
  tsukasa:{ name: 'つかさ', cls: 'tsukasa' }
};

let launched = false;
let selectedRoute = 'azusa';

window.addEventListener('DOMContentLoaded', () => {
  // 画像セット
  const az = 'data:image/webp;base64,' + IMAGES.azusa;
  const ng = 'data:image/png;base64,'  + IMAGES.nagisa;
  const ts = 'data:image/webp;base64,' + IMAGES.tsukasa;

  document.getElementById('avatar-azusa-card').src  = az;
  document.getElementById('avatar-nagisa-card').src = ng;
  document.getElementById('avatar-tsukasa-card').src= ts;
  document.getElementById('att-avatar-azusa').src   = az;
  document.getElementById('att-avatar-nagisa').src  = ng;
  document.getElementById('att-avatar-tsukasa').src = ts;
  document.getElementById('chip-img-azusa').src     = az;
  document.getElementById('chip-img-nagisa').src    = ng;
  document.getElementById('chip-img-tsukasa').src   = ts;
});

function launch() {
  document.getElementById('launch-btn').disabled = true;
  document.getElementById('attendance-area').style.display = 'block';
  document.getElementById('sys-text').textContent = 'システム起動中…';

  const seq = [
    { id: 'stat-azusa',   badge: 'badge-azusa',   delay: 600,  done: 1400 },
    { id: 'stat-nagisa',  badge: 'badge-nagisa',  delay: 1600, done: 2400 },
    { id: 'stat-tsukasa', badge: 'badge-tsukasa', delay: 2600, done: 3400 }
  ];

  seq.forEach(s => {
    setTimeout(() => {
      const el = document.getElementById(s.id);
      el.textContent = '接続中…';
      el.className = 'att-status connecting';
    }, s.delay);
    setTimeout(() => {
      const el = document.getElementById(s.id);
      el.textContent = '起動完了 ✓';
      el.className = 'att-status ok';
      document.getElementById(s.badge).style.background = '#6fc98a';
    }, s.done);
  });

  setTimeout(() => {
    const q = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    document.getElementById('q-text').textContent = q;
    document.getElementById('question-area').style.display = 'block';
    document.getElementById('routing-area').style.display = 'block';
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('sys-text').textContent = '全員起動完了 — 本日のTriSightを開始します';
    launched = true;
  }, 3800);
}

function selectRoute(r) {
  selectedRoute = r;
  ['azusa','nagisa','tsukasa'].forEach(x => {
    document.getElementById('chip-'+x).classList.toggle('selected', x === r);
  });
}

function checkSendable() {
  const t = document.getElementById('transcript').textContent.trim();
  document.getElementById('send-btn').disabled = !launched || t.length === 0;
}

function sendInput() {
  const t = document.getElementById('transcript').textContent.trim();
  if (!t) return;
  const r = routes[selectedRoute];
  const log = document.getElementById('log-area');
  const items = document.getElementById('log-items');
  log.style.display = 'block';
  const now = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const item = document.createElement('div');
  item.className = 'log-item ' + r.cls;
  item.innerHTML = '<div class="log-time">'+now+' → '+r.name+'</div>' + t;
  items.appendChild(item);
  items.scrollTop = items.scrollHeight;
  document.getElementById('transcript').textContent = '';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('sys-text').textContent = r.name + 'に送信しました — 次の起案をお待ちしています';
}

function clearInput() {
  document.getElementById('transcript').textContent = '';
  document.getElementById('send-btn').disabled = true;
}
</script>
